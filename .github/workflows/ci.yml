name: Ziglang CI

on:
  push:
  pull_request:

jobs:
  run-zig-build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Checkout LFS
        run: git lfs pull
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2
      - run: zig build test
